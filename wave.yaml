# ---------- PreSync : wave 1 ----------
apiVersion: batch/v1
kind: Job
metadata:
  name: one
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: run1
          image: alpine:latest
          command: ["/bin/sh", "-c", "echo 'PreSync / wave 1'; sleep 5"]
---
